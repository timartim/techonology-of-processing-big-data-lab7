services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openfoodfacts-kmeans-app
    volumes:
      - ./src/spark:/app/src/spark
      - ./src/data:/app/src/data
      - ./src/artifacts:/app/src/artifacts
      - ./src/models:/app/src/models
    depends_on:
      datamart:
        condition: service_healthy
    command: ["python", "main.py", "train"]

  datamart:
    build:
      context: .
      dockerfile: Dockerfile.datamart
    container_name: openfoodfacts-datamart
    environment:
      DATAMART_CONFIG: config.json
    ports:
      - "8090:8090"
    volumes:
      - ./src/datamart/config.json:/app/src/datamart/config.json:ro
      - ./src/data:/app/src/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8090'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: openfoodfacts-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:1
    container_name: openfoodfacts-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
